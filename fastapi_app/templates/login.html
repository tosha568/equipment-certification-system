<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход | secDB Portal</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>Вход в систему</h1>
    <p>Исполнитель, Руководители, Администратор</p>
    {% if error %}
      <div class="alert">{{ error }}</div>
    {% endif %}
    <form action="/web/login" method="post" class="form-grid">
      <label>Email</label>
      <input type="email" name="email" required>
      <label>Пароль</label>
      <input type="password" name="password" required>
      <button type="submit" class="btn">Войти</button>
    </form>
    <a href="/web/register" class="link">Нет аккаунта? Регистрация</a>
  </div>
</body>
</html>
